<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Premium Profile Card</title>

<style>
body {
    background: #f3f3f3;
    font-family: 'Segoe UI', sans-serif;
}

/* Card */
.card {
    width: 380px;
    margin: 40px auto;
    padding: 20px;
    border-radius: 20px;
    background: #ffffff;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

/* Profile */
.profile {
    display: flex;
    align-items: center;
}

.profile img {
    width: 70px;
    height: 70px;
    border-radius: 50%;
    border: 3px solid gold;
    margin-right: 15px;
}

.name {
    font-size: 20px;
    font-weight: bold;
}

.role {
    color: #888;
    font-size: 14px;
}

/* Tags */
.tags {
    margin: 15px 0;
}

.tag {
    display: inline-block;
    padding: 6px 12px;
    background: #f1f1f1;
    border-radius: 20px;
    font-size: 12px;
    margin-right: 8px;
}

/* Score Section */
.score-section {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

/* Gold Ring */
.score-ring {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: conic-gradient(gold 87%, #eee 0%);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
}

.score-ring::before {
    content: "";
    width: 60px;
    height: 60px;
    background: white;
    border-radius: 50%;
    position: absolute;
}

.score-ring span {
    position: relative;
    font-weight: bold;
    font-size: 18px;
}

/* Stats */
.stats {
    display: flex;
    justify-content: space-between;
    margin-top: 20px;
    text-align: center;
}

.stat {
    font-size: 12px;
}

/* Button */
.btn {
    margin-top: 20px;
    text-align: center;
}

.btn button {
    background: linear-gradient(to right, #0b3c49, #092c35);
    color: white;
    border: none;
    padding: 12px 20px;
    border-radius: 25px;
    font-size: 15px;
    cursor: pointer;
}

</style>
</head>

<body>

<div class="card">

    <div class="profile">
        <img src="https://via.placeholder.com/70">
        <div>
            <div class="name">Krishna Mohan Noti</div>
            <div class="role">Chief Life Planner</div>
        </div>
    </div>

    <div class="tags">
        <span class="tag">Life Insurance</span>
        <span class="tag">Health Insurance</span>
    </div>

    <div class="score-section">
        <div>
            <strong>YVITY Score</strong><br>
            Based on experience
        </div>

        <div class="score-ring">
            <span>87</span>
        </div>
    </div>

    <div class="stats">
        <div class="stat">10+ Years</div>
        <div class="stat">32 Reviews</div>
        <div class="stat">200+ Clients</div>
    </div>

    <div class="btn">
        <button>View Profile →</button>
    </div>

</div>

</body>
</html>
