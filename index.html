<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Profile Card</title>
<style>

body {
    font-family: Arial, sans-serif;
    background: #f2f2f2;
}

.card {
    width: 350px;
    margin: 40px auto;
    padding: 20px;
    border-radius: 20px;
    background: #fff;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

.profile {
    display: flex;
    align-items: center;
}

.profile img {
    width: 70px;
    height: 70px;
    border-radius: 50%;
    border: 3px solid gold;
    margin-right: 15px;
}

.name {
    font-size: 20px;
    font-weight: bold;
}

.role {
    color: #777;
    font-size: 14px;
}

.tags {
    margin: 15px 0;
}

.tag {
    display: inline-block;
    padding: 6px 10px;
    background: #eee;
    border-radius: 20px;
    font-size: 12px;
    margin: 5px 5px 0 0;
}

.score-section {
    display: flex;
    align-items: center;
    justify-content: space-between;
}

.score-text {
    font-size: 14px;
}

.score-ring {
    width: 80px;   /* 🔥 50% reduced size */
    height: 80px;
    border-radius: 50%;
    border: 6px solid gold;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    font-size: 18px;
}

.stats {
    display: flex;
    justify-content: space-between;
    margin-top: 20px;
}

.stat {
    text-align: center;
    font-size: 12px;
}

.btn {
    margin-top: 20px;
    text-align: center;
}

.btn button {
    padding: 12px 20px;
    border: none;
    border-radius: 25px;
    background: #0b3c49;
    color: white;
    font-size: 16px;
    cursor: pointer;
}

</style>
</head>

<body>

<div class="card">

    <div class="profile">
        <img src="https://via.placeholder.com/70" alt="profile">
        <div>
            <div class="name">Krishna Mohan Noti</div>
            <div class="role">Chief Life Planner</div>
        </div>
    </div>

    <div class="tags">
        <span class="tag">Life Insurance</span>
        <span class="tag">Health Insurance</span>
    </div>

    <div class="score-section">
        <div class="score-text">
            <strong>YVITY Score</strong><br>
            Based on experience
        </div>

        <div class="score-ring">
            87
        </div>
    </div>

    <div class="stats">
        <div class="stat">10+ Years</div>
        <div class="stat">32 Reviews</div>
        <div class="stat">200+ Clients</div>
    </div>

    <div class="btn">
        <button>View Profile →</button>
    </div>

</div>

</body>
</html>
