<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advisor Profile Card</title>
    <style>
        :root {
            --midnight-teal: #0b3d3d;
            --saffron-gold: #d4af37;
            --gold-gradient: linear-gradient(135deg, #f9f295, #e0aa3e, #b8860b, #f9f295);
            --teal-gradient: linear-gradient(135deg, #0b3d3d, #1a5e5e);
            --bg-off-white: #fcfbf7;
        }

        body {
            background-color: #f0f0f0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* Main Card Container */
        .profile-card {
            width: 380px;
            background: var(--bg-off-white);
            border-radius: 30px;
            padding: 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            border: 1px solid rgba(212, 175, 55, 0.3);
            position: relative;
            text-align: left;
        }

        /* Header Section */
        .header {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }

        .photo-container {
            position: relative;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            padding: 3px;
            background: var(--gold-gradient);
            margin-right: 15px;
        }

        .photo-container img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            background: #eee;
        }

        .verified-badge {
            position: absolute;
            bottom: 5px;
            right: -5px;
            background: #1a5e20;
            color: white;
            font-size: 10px;
            padding: 2px 5px;
            border-radius: 10px;
            border: 2px solid white;
        }

        .info h2 {
            margin: 0;
            color: var(--midnight-teal);
            font-size: 20px;
        }

        .info p {
            margin: 2px 0;
            color: #b8860b;
            font-weight: 600;
            font-size: 14px;
        }

        .location {
            color: #777 !important;
            font-size: 12px !important;
        }

        /* Tag Section */
        .tags {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tag {
            background: #f0f4f4;
            padding: 6px 10px;
            border-radius: 20px;
            font-size: 11px;
            color: var(--midnight-teal);
            display: flex;
            align-items: center;
            border: 1px solid #d1dbdb;
        }

        /* Score Section */
        .score-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(to right, transparent, rgba(212, 175, 55, 0.05));
            padding: 15px;
            border-radius: 20px;
            margin-bottom: 20px;
        }

        .score-text h4 {
            margin: 0;
            color: var(--midnight-teal);
        }

        .score-text p {
            font-size: 11px;
            color: #666;
            margin: 5px 0;
        }

        .top-advisor {
            color: var(--saffron-gold);
            font-weight: bold;
            font-size: 13px;
        }

        /* Circular Score Ring (50% scale adjustment) */
        .score-ring {
            width: 90px; /* Reduced Size */
            height: 90px;
            border-radius: 50%;
            background: var(--gold-gradient);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .ring-inner {
            width: 78px;
            height: 78px;
            background: var(--bg-off-white);
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .ring-inner .number {
            font-size: 22px;
            font-weight: bold;
            color: var(--midnight-teal);
        }

        .ring-label {
            width: 100%;
            background: var(--midnight-teal);
            color: var(--saffron-gold);
            font-size: 8px;
            text-align: center;
            padding: 4px 0;
            position: absolute;
            bottom: 15px;
        }

        /* Metrics Row */
        .metrics {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .metric-box {
            background: white;
            padding: 10px;
            border-radius: 12px;
            text-align: center;
            flex: 1;
            margin: 0 4px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            border-bottom: 3px solid var(--saffron-gold);
        }

        .metric-box strong {
            display: block;
            font-size: 16px;
            color: var(--midnight-teal);
        }

        .metric-box span {
            font-size: 10px;
            color: #888;
        }

        /* Primary Button */
        .view-btn {
            width: 100%;
            background: var(--teal-gradient);
            color: var(--saffron-gold);
            border: none;
            padding: 15px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            transition: transform 0.2s;
        }

        .view-btn:hover {
            transform: scale(1.02);
        }
    </style>
</head>
<body>

    <div class="profile-card">
        <div class="header">
            <div class="photo-container">
                <!-- Replace with actual image URL -->
                <img src="https://via.placeholder.com/80" alt="Krishna Mohan">
                <div class="verified-badge">✔</div>
            </div>
            <div class="info">
                <h2>Krishna Mohan Noti</h2>
                <p>Chief Life Planner</p>
                <div class="location">📍 Nellore, AP</div>
            </div>
        </div>

        <div class="tags">
            <div class="tag">🛡️ Life Insurance</div>
            <div class="tag">➕ Health Insurance</div>
            <div class="tag">🏆 Founding Member</div>
            <div class="tag">🚩 MDRT Member</div>
        </div>

        <div class="score-section">
            <div class="score-text">
                <h4>YVITY Score</h4>
                <p>Based on experience, client feedback<br>& performance</p>
                <div class="top-advisor">Top 10% Advisor</div>
            </div>
            <div class="score-ring">
                <div class="ring-inner">
                    <div class="number">87<small>/100</small></div>
                    <div class="ring-label">YVITY SCORE</div>
                </div>
            </div>
        </div>

        <div class="metrics">
            <div class="metric-box">
                <strong>10+</strong>
                <span>Years Exp.</span>
            </div>
            <div class="metric-box">
                <strong>32</strong>
                <span>Reviews</span>
            </div>
            <div class="metric-box">
                <strong>12</strong>
                <span>Recommnds</span>
            </div>
            <div class="metric-box">
                <strong>200+</strong>
                <span>Clients</span>
            </div>
        </div>

        <button class="view-btn">
            View Profile &rarr;
        </button>
    </div>

</body>
</html>
